<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ligh and Jin</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #000000;
    --fg: #ededed;
    --muted: #8f8f8f;
    --line: #1f1f1f;
  }

  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100dvh;
    display: grid;
    place-items: center;
    overflow: hidden;
    position: relative;
  }

  .glow {
    position: fixed;
    top: -25%;
    left: 50%;
    transform: translateX(-50%);
    width: 90vw;
    max-width: 900px;
    height: 600px;
    background: radial-gradient(50% 50% at 50% 50%, rgba(255, 255, 255, 0.08), transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .grid {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background-image:
      linear-gradient(to right, var(--line) 1px, transparent 1px),
      linear-gradient(to bottom, var(--line) 1px, transparent 1px);
    background-size: 64px 64px;
    -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 45%, #000 30%, transparent 75%);
    mask-image: radial-gradient(ellipse 70% 60% at 50% 45%, #000 30%, transparent 75%);
    opacity: 0.6;
  }

  .wrap {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 2rem;
    opacity: 0;
    transform: translateY(8px);
    animation: enter 0.9s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  h1 {
    font-weight: 700;
    font-size: clamp(2.4rem, 8vw, 5rem);
    letter-spacing: -0.04em;
    line-height: 1.05;
    background: linear-gradient(180deg, #ffffff 0%, #999999 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .sub {
    margin-top: 1.5rem;
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: 0.02em;
    color: var(--muted);
  }

  .pulse {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 0 12px 2px rgba(255, 255, 255, 0.6);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes enter {
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.4; transform: scale(0.85); }
  }

  @media (prefers-reduced-motion: reduce) {
    .wrap { animation-duration: 0.01s; }
    .pulse { animation: none; }
  }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="grid"></div>
  <main class="wrap">
    <h1>Ligh and Jin</h1>
    <p class="sub"><span class="pulse"></span>Coming soon</p>
  </main>
</body>
</html>
