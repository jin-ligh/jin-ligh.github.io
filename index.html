<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ligh and Jin</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #000000;
    --fg: #ededed;
    --muted: #8f8f8f;
    --line: #1a1a1a;
    --line-hi: #3a3a3a;
    --mx: 50%;
    --my: 35%;
  }

  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100dvh;
    display: grid;
    place-items: center;
    overflow: hidden;
    position: relative;
  }

  /* glow follows cursor */
  .glow {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
    background: radial-gradient(420px circle at var(--mx) var(--my), rgba(255,255,255,0.10), transparent 60%);
    transition: background 0.18s ease-out;
  }

  /* base faint grid */
  .grid {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background-image:
      linear-gradient(to right, var(--line) 1px, transparent 1px),
      linear-gradient(to bottom, var(--line) 1px, transparent 1px);
    background-size: 56px 56px;
    -webkit-mask-image: radial-gradient(ellipse 75% 65% at 50% 45%, #000 30%, transparent 78%);
    mask-image: radial-gradient(ellipse 75% 65% at 50% 45%, #000 30%, transparent 78%);
  }

  /* bright grid revealed only around the cursor (spotlight) */
  .grid-hi {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background-image:
      linear-gradient(to right, var(--line-hi) 1px, transparent 1px),
      linear-gradient(to bottom, var(--line-hi) 1px, transparent 1px);
    background-size: 56px 56px;
    -webkit-mask-image: radial-gradient(200px circle at var(--mx) var(--my), #000 0%, transparent 65%);
    mask-image: radial-gradient(200px circle at var(--mx) var(--my), #000 0%, transparent 65%);
    transition: -webkit-mask-image 0.08s linear, mask-image 0.08s linear;
  }

  .wrap {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 2rem;
    opacity: 0;
    transform: translateY(8px);
    animation: enter 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  h1 {
    font-weight: 600;
    font-size: clamp(2.6rem, 8.5vw, 5.4rem);
    letter-spacing: -0.045em;
    line-height: 1.04;
    background: linear-gradient(180deg, #ffffff 10%, #8a8a8a 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .sub {
    margin-top: 1.6rem;
    display: inline-flex;
    align-items: center;
    gap: 0.65rem;
    font-family: 'Space Mono', ui-monospace, monospace;
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.34em;
    text-transform: uppercase;
    color: var(--muted);
    padding-left: 0.34em;
  }

  .pulse {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 0 12px 2px rgba(255,255,255,0.55);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes enter { to { opacity: 1; transform: translateY(0); } }
  @keyframes pulse { 0%,100% { opacity: 1; transform: scale(1);} 50% { opacity: 0.35; transform: scale(0.8);} }

  @media (prefers-reduced-motion: reduce) {
    .wrap { animation-duration: 0.01s; }
    .pulse { animation: none; }
    .glow, .grid-hi { transition: none; }
  }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="grid"></div>
  <div class="grid-hi"></div>
  <main class="wrap">
    <h1>Ligh and Jin</h1>
    <p class="sub"><span class="pulse"></span>Coming soon</p>
  </main>
<script>
  const root = document.documentElement;
  let raf = null, tx = innerWidth/2, ty = innerHeight*0.35;
  function move(e){
    const p = e.touches ? e.touches[0] : e;
    tx = p.clientX; ty = p.clientY;
    if (raf) return;
    raf = requestAnimationFrame(() => {
      root.style.setProperty('--mx', tx + 'px');
      root.style.setProperty('--my', ty + 'px');
      raf = null;
    });
  }
  window.addEventListener('pointermove', move, { passive: true });
  window.addEventListener('touchmove', move, { passive: true });
</script>
</body>
</html>
